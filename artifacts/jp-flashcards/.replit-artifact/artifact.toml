kind = "web"
previewPath = "/"
title = "Japanese Flashcards"
version = "1.0.0"
id = "artifacts/jp-flashcards"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20061

[services.development]
run = "pnpm --filter @workspace/jp-flashcards run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jp-flashcards", "run", "build" ]
publicDir = "artifacts/jp-flashcards/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20061"
BASE_PATH = "/"
