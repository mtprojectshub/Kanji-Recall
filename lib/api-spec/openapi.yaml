openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ocr
    description: OCR and text extraction operations
  - name: cards
    description: Flashcard operations
  - name: sessions
    description: Review session operations
  - name: dashboard
    description: Dashboard summary operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ocr/extract:
    post:
      operationId: extractVocabulary
      tags: [ocr]
      summary: Extract vocabulary from image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractVocabularyBody"
      responses:
        "200":
          description: Extracted vocabulary pairs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractVocabularyResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards:
    get:
      operationId: listCards
      tags: [cards]
      summary: List all flashcards
      responses:
        "200":
          description: List of flashcards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FlashcardResponse"
    post:
      operationId: createCard
      tags: [cards]
      summary: Create a new flashcard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCardBody"
      responses:
        "201":
          description: Created flashcard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashcardResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cards/lessons:
    get:
      operationId: getLessonCards
      tags: [cards]
      summary: Get cards in lesson queue (not yet introduced to SRS)
      responses:
        "200":
          description: List of lesson cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FlashcardResponse"

  /cards/due:
    get:
      operationId: getDueCards
      tags: [cards]
      summary: Get cards due for review
      responses:
        "200":
          description: List of due cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FlashcardResponse"

  /cards/{id}:
    patch:
      operationId: updateCard
      tags: [cards]
      summary: Update a flashcard (SRS state, edits)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCardBody"
      responses:
        "200":
          description: Updated flashcard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashcardResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCard
      tags: [cards]
      summary: Delete a flashcard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List review sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewSessionResponse"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Record a review session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewSessionResponse"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    ExtractVocabularyBody:
      type: object
      properties:
        imageBase64:
          type: string
        mimeType:
          type: string
      required: [imageBase64, mimeType]

    VocabularyPair:
      type: object
      properties:
        japanese:
          type: string
        reading:
          type: string
        english:
          type: string
        partOfSpeech:
          type: string
      required: [japanese, english]

    ExtractVocabularyResponse:
      type: object
      properties:
        pairs:
          type: array
          items:
            $ref: "#/components/schemas/VocabularyPair"
        rawText:
          type: string
      required: [pairs, rawText]

    FlashcardResponse:
      type: object
      properties:
        id:
          type: string
        japanese:
          type: string
        reading:
          type: string
        english:
          type: string
        partOfSpeech:
          type: ["string", "null"]
        srsStage:
          type: string
        nextReview:
          type: number
        totalReviews:
          type: integer
        correctReviews:
          type: integer
        incorrectReviews:
          type: integer
        streak:
          type: integer
        lastReviewed:
          type: ["number", "null"]
        lessonDirectionsCompleted:
          type: array
          items:
            type: string
        lessonComplete:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - japanese
        - reading
        - english
        - srsStage
        - nextReview
        - totalReviews
        - correctReviews
        - incorrectReviews
        - streak
        - lessonDirectionsCompleted
        - lessonComplete
        - createdAt

    CreateCardBody:
      type: object
      properties:
        japanese:
          type: string
        reading:
          type: string
        english:
          type: string
        partOfSpeech:
          type: ["string", "null"]
      required: [japanese, english]

    UpdateCardBody:
      type: object
      properties:
        japanese:
          type: string
        reading:
          type: string
        english:
          type: string
        partOfSpeech:
          type: ["string", "null"]
        srsStage:
          type: string
        nextReview:
          type: number
        totalReviews:
          type: integer
        correctReviews:
          type: integer
        incorrectReviews:
          type: integer
        streak:
          type: integer
        lastReviewed:
          type: ["number", "null"]
        lessonDirectionsCompleted:
          type: array
          items:
            type: string
        lessonComplete:
          type: boolean

    ReviewSessionResponse:
      type: object
      properties:
        id:
          type: string
        date:
          type: number
        cardsReviewed:
          type: integer
        correct:
          type: integer
        incorrect:
          type: integer
        createdAt:
          type: string
      required: [id, date, cardsReviewed, correct, incorrect, createdAt]

    CreateSessionBody:
      type: object
      properties:
        date:
          type: number
        cardsReviewed:
          type: integer
        correct:
          type: integer
        incorrect:
          type: integer
      required: [date, cardsReviewed, correct, incorrect]

    StageCount:
      type: object
      properties:
        stage:
          type: string
        count:
          type: integer
      required: [stage, count]

    DashboardSummary:
      type: object
      properties:
        lessonsCount:
          type: integer
        reviewsDueCount:
          type: integer
        totalCards:
          type: integer
        burnedCount:
          type: integer
        allTimeAccuracy:
          type: number
        totalReviews:
          type: integer
        stageCounts:
          type: array
          items:
            $ref: "#/components/schemas/StageCount"
      required:
        - lessonsCount
        - reviewsDueCount
        - totalCards
        - burnedCount
        - allTimeAccuracy
        - totalReviews
        - stageCounts
