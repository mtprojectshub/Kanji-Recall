openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ocr
    description: OCR and text extraction operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ocr/extract:
    post:
      operationId: extractVocabulary
      tags: [ocr]
      summary: Extract vocabulary from image
      description: Uses AI vision to extract Japanese/English vocabulary pairs from an uploaded image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractVocabularyBody"
      responses:
        "200":
          description: Extracted vocabulary pairs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractVocabularyResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ExtractVocabularyBody:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data
        mimeType:
          type: string
          description: MIME type of the image (e.g. image/jpeg, image/png)
      required:
        - imageBase64
        - mimeType
    VocabularyPair:
      type: object
      properties:
        japanese:
          type: string
          description: Japanese text (kanji/kana)
        reading:
          type: string
          description: Reading in hiragana/katakana (optional)
        english:
          type: string
          description: English meaning
        partOfSpeech:
          type: string
          description: Part of speech (noun, verb, adjective, etc.)
      required:
        - japanese
        - english
    ExtractVocabularyResponse:
      type: object
      properties:
        pairs:
          type: array
          items:
            $ref: "#/components/schemas/VocabularyPair"
        rawText:
          type: string
          description: Raw text extracted from the image
      required:
        - pairs
        - rawText
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
